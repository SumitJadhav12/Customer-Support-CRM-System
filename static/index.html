<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support CRM System</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto px-4 py-8 max-w-6xl">
        <div class="bg-white rounded-lg shadow-md p-6 mb-6">
            <h1 class="text-3xl font-bold text-gray-800">Support CRM System</h1>
            <p class="text-gray-600 mt-2">Manage customer support tickets</p>
        </div>

        <!-- Create Ticket Button -->
        <div class="mb-6">
            <button onclick="openModal()" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700">
                + Create New Ticket
            </button>
        </div>

        <!-- Search and Filter -->
        <div class="bg-white rounded-lg shadow-md p-4 mb-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="search" placeholder="Search by name, ID, email, subject..." 
                       class="border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                <select id="status" class="border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="all">All Status</option>
                    <option value="Open">Open</option>
                    <option value="In Progress">In Progress</option>
                    <option value="Closed">Closed</option>
                </select>
            </div>
        </div>

        <!-- Tickets Table -->
        <div class="bg-white rounded-lg shadow-md overflow-hidden">
            <table class="w-full">
                <thead class="bg-gray-800 text-white">
                    <tr>
                        <th class="px-6 py-3 text-left">Ticket ID</th>
                        <th class="px-6 py-3 text-left">Customer</th>
                        <th class="px-6 py-3 text-left">Subject</th>
                        <th class="px-6 py-3 text-left">Status</th>
                        <th class="px-6 py-3 text-left">Created</th>
                        <th class="px-6 py-3 text-left">Actions</th>
                    </tr>
                </thead>
                <tbody id="ticketsList" class="divide-y divide-gray-200"></tbody>
            </table>
        </div>
    </div>

    <!-- Create Ticket Modal -->
    <div id="modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center">
        <div class="bg-white rounded-lg p-6 w-full max-w-md">
            <h2 class="text-2xl font-bold mb-4">Create New Ticket</h2>
            <form id="ticketForm">
                <input type="text" id="name" placeholder="Customer Name" required class="w-full border rounded-lg px-4 py-2 mb-3">
                <input type="email" id="email" placeholder="Email" required class="w-full border rounded-lg px-4 py-2 mb-3">
                <input type="text" id="subject" placeholder="Subject" required class="w-full border rounded-lg px-4 py-2 mb-3">
                <textarea id="description" placeholder="Description" rows="3" required class="w-full border rounded-lg px-4 py-2 mb-3"></textarea>
                <div class="flex gap-2">
                    <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 flex-1">Create</button>
                    <button type="button" onclick="closeModal()" class="bg-gray-300 text-gray-700 px-4 py-2 rounded-lg hover:bg-gray-400 flex-1">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Ticket Detail Modal -->
    <div id="detailModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center">
        <div class="bg-white rounded-lg p-6 w-full max-w-2xl max-h-[80vh] overflow-y-auto">
            <div id="detailContent"></div>
            <button onclick="closeDetailModal()" class="mt-4 bg-gray-500 text-white px-4 py-2 rounded-lg">Close</button>
        </div>
    </div>

    <script>
        let searchTimeout;

        async function loadTickets() {
            const search = document.getElementById('search').value;
            const status = document.getElementById('status').value;
            let url = '/api/tickets?';
            if (status !== 'all') url += `status=${status}&`;
            if (search) url += `search=${encodeURIComponent(search)}`;
            
            const res = await fetch(url);
            const tickets = await res.json();
            const tbody = document.getElementById('ticketsList');
            
            if (tickets.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center py-8 text-gray-500">No tickets found</td></tr>';
                return;
            }
            
            tbody.innerHTML = tickets.map(t => `
                <tr class="hover:bg-gray-50">
                    <td class="px-6 py-4 font-mono">${t.ticket_id}</td>
                    <td class="px-6 py-4">${escapeHtml(t.customer_name)}</td>
                    <td class="px-6 py-4">${escapeHtml(t.subject)}</td>
                    <td class="px-6 py-4"><span class="px-2 py-1 rounded-full text-xs ${getStatusClass(t.status)}">${t.status}</span></td>
                    <td class="px-6 py-4">${new Date(t.created_at).toLocaleDateString()}</td>
                    <td class="px-6 py-4"><button onclick="viewTicket('${t.ticket_id}')" class="text-blue-600 hover:underline">View</button></td>
                </tr>
            `).join('');
        }

        function getStatusClass(status) {
            const classes = {
                'Open': 'bg-blue-100 text-blue-800',
                'In Progress': 'bg-yellow-100 text-yellow-800',
                'Closed': 'bg-green-100 text-green-800'
            };
            return classes[status] || 'bg-gray-100 text-gray-800';
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        async function viewTicket(id) {
            const res = await fetch(`/api/tickets/${id}`);
            const ticket = await res.json();
            
            document.getElementById('detailContent').innerHTML = `
                <h2 class="text-2xl font-bold mb-4">Ticket ${ticket.ticket_id}</h2>
                <div class="space-y-3">
                    <p><strong>Customer:</strong> ${escapeHtml(ticket.customer_name)}</p>
                    <p><strong>Email:</strong> ${escapeHtml(ticket.customer_email)}</p>
                    <p><strong>Subject:</strong> ${escapeHtml(ticket.subject)}</p>
                    <p><strong>Description:</strong> ${escapeHtml(ticket.description)}</p>
                    <p><strong>Status:</strong> 
                        <select id="newStatus" class="border rounded px-2 py-1">
                            <option ${ticket.status === 'Open' ? 'selected' : ''}>Open</option>
                            <option ${ticket.status === 'In Progress' ? 'selected' : ''}>In Progress</option>
                            <option ${ticket.status === 'Closed' ? 'selected' : ''}>Closed</option>
                        </select>
                    </p>
                    <p><strong>Created:</strong> ${new Date(ticket.created_at).toLocaleString()}</p>
                    <p><strong>Last Updated:</strong> ${new Date(ticket.updated_at).toLocaleString()}</p>
                    
                    <div class="mt-4">
                        <label class="block font-bold mb-2">Add Note:</label>
                        <textarea id="noteText" rows="2" class="w-full border rounded px-3 py-2"></textarea>
                        <button onclick="updateTicket('${ticket.ticket_id}')" class="mt-2 bg-green-600 text-white px-4 py-2 rounded">Update Status & Add Note</button>
                    </div>
                    
                    <div class="mt-4">
                        <h3 class="font-bold mb-2">Notes History:</h3>
                        <div class="space-y-2 max-h-48 overflow-y-auto">
                            ${ticket.notes && ticket.notes.length ? ticket.notes.map(n => `
                                <div class="bg-gray-100 p-2 rounded">
                                    <p>${escapeHtml(n.note_text)}</p>
                                    <p class="text-xs text-gray-500 mt-1">${new Date(n.created_at).toLocaleString()}</p>
                                </div>
                            `).join('') : '<p class="text-gray-500">No notes yet</p>'}
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('detailModal').classList.remove('hidden');
            document.getElementById('detailModal').style.display = 'flex';
        }

        async function updateTicket(id) {
            const status = document.getElementById('newStatus').value;
            const notes = document.getElementById('noteText').value;
            
            const res = await fetch(`/api/tickets/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status, notes })
            });
            
            if (res.ok) {
                alert('Ticket updated successfully');
                closeDetailModal();
                loadTickets();
            } else {
                alert('Update failed');
            }
        }

        document.getElementById('ticketForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                customer_name: document.getElementById('name').value,
                customer_email: document.getElementById('email').value,
                subject: document.getElementById('subject').value,
                description: document.getElementById('description').value
            };
            
            const res = await fetch('/api/tickets', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            
            if (res.ok) {
                alert('Ticket created successfully');
                closeModal();
                loadTickets();
                document.getElementById('ticketForm').reset();
            } else {
                alert('Creation failed');
            }
        });

        function openModal() {
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modal').style.display = 'flex';
        }
        
        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }
        
        function closeDetailModal() {
            document.getElementById('detailModal').style.display = 'none';
        }

        document.getElementById('search').addEventListener('input', () => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(loadTickets, 300);
        });
        document.getElementById('status').addEventListener('change', loadTickets);
        
        loadTickets();
    </script>
</body>
</html>
