cd "C:\Users\sj165\OneDrive\Desktop\Customer CRM project"

# Create nixpacks.toml with explicit Python version
@'
[phases.setup]
nixPkgs = ["python311"]

[phases.install]
cmds = [
  "python --version",
  "pip install --upgrade pip",
  "pip install -r requirements.txt"
]

[phases.start]
cmd = "uvicorn main:app --host 0.0.0.0 --port $PORT"

[build]
command = "pip install -r requirements.txt"
'@ | Out-File -FilePath nixpacks.toml -Encoding UTF8

# Verify content
Get-Content nixpacks.toml
